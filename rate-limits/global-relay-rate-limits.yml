specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Global Relay
providerId: global-relay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Archiving
  - Compliance
description: Global Relay does not publish numeric API rate limits in its public-facing materials. Limits
  are governed by the customer agreement and applied at the tenant level. Customers should consult their
  Global Relay implementation engineer for documented per-tenant caps.
notes: Reconcile once Global Relay publishes per-tenant rate limit numbers.
sources:
  - https://www.globalrelay.com/
responseCodes:
  throttled: 429
limits:
  - name: Tenant-level rate limit
    scope: tenant
    metric: varies
    limit: see tenant agreement / Global Relay implementation engineer
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter on 429 responses; coordinate burst loads with
      Global Relay support.
  - name: Tenant scoping
    description: Limits are scoped per tenant rather than per API key; multiple integrations from the
      same tenant share quota.
maintainers:
