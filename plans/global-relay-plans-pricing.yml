specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Global Relay
providerId: global-relay
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Archiving
  - Compliance
  - Data Retention
  - Email Security
  - Regulatory Compliance
description: Global Relay provides regulated communication archiving, supervision, and surveillance for
  financial services firms. Pricing is custom-quoted per organization based on user count, retention years,
  data sources connected, and bundled add-ons (Archive, Eye, Connectors). No public price list is published.
notes: Reconcile after a published rate card is available.
sources:
  - https://www.globalrelay.com/products/archive/
  - https://www.globalrelay.com/
plans:
  - id: global-relay-archive
    name: Archive (Custom Quote)
    type: enterprise
    description: Per-user / per-month archiving with custom retention pricing — sales-led quote.
    entries:
      - label: Per-user monthly subscription
        name: archive_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Storage / retention
        name: storage_retention
        type: metered
        metric: GB-year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: 100+ communication data connectors
      - name: Tamper-evident, write-once-read-many storage
      - name: Configurable retention
      - name: Global Relay Archive API
  - id: global-relay-supervision
    name: Supervision / Surveillance Add-on
    type: enterprise
    description: Add-on supervisory review and surveillance modules; priced as add-on per user/month.
    entries:
      - label: Per-user supervision add-on
        name: supervision_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: true
    elements:
      - name: Lexicon-based and AI-driven review
      - name: Configurable supervisory workflows
      - name: Audit trails
maintainers:
