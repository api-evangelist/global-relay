meters:
  - name: archived_seats
    description: Active users covered by Global Relay Archive
    unit: seat
    aggregation: max
    dimensions:
      - business_unit
      - data_source
  - name: archive_storage
    description: Stored archive volume across all data sources
    unit: GB-month
    aggregation: sum
    dimensions:
      - data_source
      - retention_class
  - name: connector_count
    description: Number of active communication-source connectors
    unit: connector
    aggregation: max
  - name: supervisory_review_volume
    description: Messages reviewed via supervision/surveillance modules
    unit: message
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Global Relay reporting console to track licensed seat count, ingest volume,
      and retention growth per data source.
  - name: Allocation
    description: Allocate seat costs to the regulated-business-unit owner; storage and retention overlays
      to the legal/compliance budget.
  - name: Optimization
    description: Right-size seats by deactivating departed users promptly; tune retention class to regulatory
      minimum; consolidate fragmented connectors.
  - name: Accountability
    description: Compliance and IT operations co-own Global Relay spend; renewal review is annual with
      vendor.
maintainers:
