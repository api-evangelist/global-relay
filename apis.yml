description: >-
  Global Relay is an enterprise-grade archiving and compliance platform for
  electronic communications including email, instant messaging, voice, video,
  and collaboration tools across regulated industries. It provides APIs for
  archiving conversations, emails, voice recordings, and event feeds from
  social media and collaboration platforms, ensuring organizations meet their
  compliance and regulatory requirements through secure, tamper-proof archiving
  with OAuth 2.0 authenticated REST APIs.
